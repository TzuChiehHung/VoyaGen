# 這是 VoyaGen 旅遊行程 YAML 範本說明書。
# 請依照本格式生成您的行程資料，AI 產出後存至 Google Drive 並取得公開連結，再以 ?data=YOUR_URL 方式開啟行程展示頁。

meta:
  title: "2026 日本京都大阪 5天4夜深度之旅"
  subtitle: "古都千年風華與現代都會的完美交響"
  route: "桃園 ✈️ 關西空港 🚃 京都 🚃 大阪"
  date_range: "3/20 - 3/24"
  last_updated: "2026-01-01"

  theme:
    primary: "rose"
    hero_gradient_from: "#0f172a"
    hero_gradient_via: "#4c0519"
    hero_gradient_to: "#1e1b4b"
    primary_dark: "#0f172a"
    primary_mid: "#881337"
    accent_primary: "#e11d48"
    accent_light: "#fb7185"
    accent_bg: "#fff1f2"
    accent_shadow: "rgba(225, 29, 72, 0.4)"
    timeline_border: "#fda4af"
    btn_gradient_from: "#881337"
    btn_gradient_to: "#e11d48"
    btn_border: "#881337"
    btn_shadow: "rgba(225, 29, 72, 0.25)"
    milestone_bg_from: "#fff1f2"
    milestone_bg_to: "#ffe4e6"
    milestone_border: "#fda4af"
    milestone_shadow: "rgba(225, 29, 72, 0.08)"
    flight_text: "#e11d48"
    map_hover: "#be123c"
    subtitle_text: "#fda4af"
    date_text: "#e11d48"

days:
  - day_number: 1
    date_label: "Day 1 — 3/20 (五)"
    day_title: "啟程！關西空港入境，直衝京都古城"
    timeline:
      - type: "milestone"
        time: "08:00 - 09:00"
        title: "機場接駁出發 🛫"
        description: "預約機場接駁，建議提前 2.5 小時抵達辦理登機手續"

      - type: "activity"
        time: "11:30 - 14:30"
        title: "桃園 TPE ✈️ 關西空港 KIX"
        bullets:
          - "搭乘長榮航空 BR106，飛行時間約 3 小時"
          - "抵達關西空港後辦理入境，領取預購網卡"

      - type: "transfer"
        time: "15:00 - 16:15"
        title: "關西空港 ➔ 京都駅"
        description: "搭乘 HARUKA 特急列車直達京都，車程約 75 分鐘"
        notes:
          - icon: "fa-solid fa-ticket"
            title: "票務提醒："
            content: "建議事先購買 ICOCA + HARUKA 套票，含來回 HARUKA 特急券與 ICOCA 儲值卡"
          - icon: "fa-solid fa-triangle-exclamation"
            title: "注意："
            content: "旺季（3月下旬賞櫻期間）班次可能客滿，請事先網路訂位"
        map_link: "https://www.google.com/maps/search/?api=1&query=關西國際機場"

      - type: "activity"
        time: "16:15 - 17:00"
        title: "抵達飯店 Check-in 🏨"
        bullets:
          - "飯店：京都四條烏丸附近（行程自訂）"
          - "放置行李、稍作休息"
        map_link: "https://www.google.com/maps/search/?api=1&query=京都四条烏丸"

      - type: "activity"
        time: "18:00 - 20:00"
        title: "錦市場散策與晚餐 🍜"
        bullets:
          - "漫步「京都廚房」錦市場，品嚐湯葉、醃漬物等在地小食"
          - "在四條周邊找一家居酒屋享用正式晚餐"
        notes:
          - icon: "fa-solid fa-clock"
            title: "貼心提示："
            content: "錦市場攤商通常 18:00 前陸續打烊，請提早前往"
        map_link: "https://www.google.com/maps/search/?api=1&query=錦市場+京都"

  - day_number: 2
    date_label: "Day 2 — 3/21 (六)"
    day_title: "嵐山竹林與金閣寺：京都精華一日遊"
    timeline:
      - type: "milestone"
        time: "08:30"
        title: "早餐後出發，今日重點：嵐山 🎋"
        description: "搭嵐電前往嵐山站，全日走訪京都西側的自然與文化精華"

      - type: "activity"
        time: "09:30 - 11:00"
        title: "嵐山竹林小徑與天龍寺"
        bullets:
          - "穿越著名的翠綠竹林小徑，清晨人潮較少，最適合拍照"
          - "天龍寺：世界文化遺產，以枯山水庭園聞名"
        map_link: "https://www.google.com/maps/search/?api=1&query=嵐山竹林+京都"

      - type: "split"
        time: "14:00"
        title: "午後自由活動（自選路線）"
        tracks:
          - track_name: "🏰 文化歷史線"
            color_theme: "amber"
            icon: "fa-solid fa-torii-gate"
            items:
              - type: "activity"
                time: "14:00 - 15:30"
                title: "金閣寺（鹿苑寺）"
                bullets:
                  - "金碧輝煌的世界遺產，湖面倒影是必拍經典"
                  - "建議 14:00 前後前往，人潮相對稀少"
                map_link: "https://www.google.com/maps/search/?api=1&query=金閣寺+京都"
              - type: "transfer"
                time: "15:30 - 16:00"
                title: "搭乘市巴士前往四條"
                description: "乘坐 101 或 204 號市巴士，車程約 30 分鐘"

          - track_name: "☕ 咖啡漫遊線"
            color_theme: "emerald"
            icon: "fa-solid fa-mug-hot"
            items:
              - type: "activity"
                time: "14:00 - 16:00"
                title: "河原町咖啡廳巡禮"
                bullets:
                  - "造訪木屋町、先斗町一帶的特色咖啡廳"
                  - "品嚐京都宇治抹茶甜點"
                map_link: "https://www.google.com/maps/search/?api=1&query=木屋町+京都"

        converge_note: "16:30 於四條大橋集合，一同前往晚餐地點"

      - type: "activity"
        time: "17:30 - 19:30"
        title: "祇園花見小路夜間散策 🏮"
        bullets:
          - "漫步充滿古都風情的石板小徑，黃昏燈籠點亮後氛圍絕佳"
          - "運氣好可能巧遇藝妓出行"
        map_link: "https://www.google.com/maps/search/?api=1&query=花見小路+京都"
