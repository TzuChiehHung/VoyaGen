<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊行程生成器</title>
    
    <!-- Chrome Tab Icon (Favicon) - 統一地球與紙飛機圖示 -->
    <link rel="icon" type="image/svg+xml" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%234f46e5'/><path d='M16 2 A14 14 0 0 0 2 16 A14 14 0 0 0 16 30 A14 14 0 0 0 30 16 A14 14 0 0 0 16 2 Z' fill='none' stroke='white' stroke-width='1.5' opacity='0.3'/><path d='M16 2 Q22 16 16 30 Q10 16 16 2' fill='none' stroke='white' stroke-width='1.5' opacity='0.4'/><path d='M2 16 H30' fill='none' stroke='white' stroke-width='1.5' opacity='0.4'/><path d='M12 18 L24 8 L20 22 L16 19 L12 18 Z M16 19 L24 8 L12 18 Z' fill='white'/></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Core CSS -->
    <link rel="stylesheet" href="assets/css/theme.css">
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen">

    <!-- Hero Section -->
    <header id="hero-section" class="bg-gradient-to-r from-slate-900 via-indigo-900 to-emerald-900 text-white shadow-lg relative overflow-hidden transition-all duration-500">
        <div class="absolute top-4 left-10 w-3 h-3 bg-white/20 rounded-full blur-sm"></div>
        <div class="absolute top-10 right-20 w-4 h-4 bg-white/30 rounded-full blur-sm"></div>
        <div class="absolute bottom-8 left-1/4 w-2 h-2 bg-white/20 rounded-full blur-sm"></div>
        
        <div class="max-w-5xl mx-auto px-4 py-10 relative z-10 text-center md:text-left">
            <p id="trip-subtitle" class="font-bold tracking-widest text-sm md:text-base mb-2">✦ 旅遊行程 ✦</p>
            <h1 id="trip-title" class="text-3xl md:text-5xl font-black mb-4 tracking-wide leading-tight">加載中...</h1>
            <div class="flex flex-col md:flex-row items-center justify-center md:justify-between gap-3 mt-4">
                <p class="text-base md:text-lg font-medium opacity-90 flex flex-col md:flex-row items-center justify-center md:justify-start gap-3 md:gap-4">
                    <span id="trip-date" class="bg-white/10 border border-white/20 px-3 py-1 rounded-full text-sm shadow-sm backdrop-blur-sm">--/-- - --/--</span>
                    <span id="trip-divider" class="hidden md:inline opacity-40">|</span>
                    <span id="trip-route"></span>
                </p>
                <span id="trip-update" class="text-xs font-normal tracking-wide opacity-50">最後更新：--</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row gap-6">
            <!-- Day Selector Sidebar -->
            <div class="md:w-1/4">
                <div id="day-sidebar" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-2 md:sticky md:top-6 flex md:flex-col overflow-x-auto hide-scrollbar gap-1">
                    <!-- Day buttons will be dynamically injected here -->
                    <div class="py-4 text-center text-slate-400 w-full">
                        <i class="fa-solid fa-circle-notch fa-spin"></i>
                    </div>
                </div>
            </div>

            <!-- Timeline Content Box -->
            <div class="md:w-3/4 bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                
                <!-- Toggle Switch for Transfers -->
                <div class="flex justify-end mb-4 border-b border-slate-100 pb-4">
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="transfer-toggle" class="sr-only peer">
                        <div class="relative w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        <span class="ms-3 text-sm font-medium text-slate-600 select-none">顯示交通與車程時間</span>
                    </label>
                </div>

                <!-- Timeline Inject Point -->
                <div id="day-content-area" class="relative">
                    <div class="text-center py-20 text-slate-400">
                        <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Core Script -->
    <script src="src/templates.js"></script>
    <script src="src/render.js"></script>
</body>
</html>
